name: Daily Quran Publisher

on:
  workflow_dispatch:

  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libraqm0 \
            fonts-noto-core \
            fonts-noto-extra

      - name: Show Arabic fonts
        run: |
          fc-list | grep -i "Noto Naskh Arabic" | head -10 || true

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Pillow RTL support
        run: |
          python - <<'PY'
          from PIL import features

          print("RAQM support:", features.check("raqm"))

          if not features.check("raqm"):
              raise RuntimeError(
                  "Pillow was installed without RAQM support."
              )
          PY

      - name: Run publisher
        run: |
          python main.py

      - name: Check generated video
        run: |
          test -f output/video.mp4
          test -s output/video.mp4

          echo "Generated files:"
          ls -lh output/

          echo "Video streams:"
          ffprobe \
            -v error \
            -show_entries stream=index,codec_type,codec_name \
            -of default=noprint_wrappers=1 \
            output/video.mp4

          ffprobe \
            -v error \
            -select_streams a:0 \
            -show_entries stream=codec_name \
            -of csv=p=0 \
            output/video.mp4 \
            | grep -q .

      - name: Upload generated files
        uses: actions/upload-artifact@v6
        with:
          name: quran-video-${{ github.run_number }}
          path: |
            output/video.mp4
            output/preview.png
            output/title.txt
            output/description.txt
            output/tags.json
            output/report.json
          retention-days: 7

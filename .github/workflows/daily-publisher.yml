name: Daily Quran Publisher

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

            - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Start publisher
        run: |
          python main.py
